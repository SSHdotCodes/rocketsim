<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>RocketSim — orbital flight in your browser</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05080d;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#dfe6ee}
  #canvas{display:block;width:100vw;height:100vh;touch-action:none;outline:none}
  #loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;background:radial-gradient(circle at 50% 35%,#11253f,#05080d 70%);
    transition:opacity .6s ease;z-index:10}
  #loader h1{margin:0;font-size:40px;letter-spacing:6px;font-weight:800;
    background:linear-gradient(90deg,#7fd0ff,#9affc8);-webkit-background-clip:text;
    background-clip:text;color:transparent}
  #loader p{margin:0;color:#6b7888;font-size:14px;letter-spacing:2px}
  .bar{width:240px;height:5px;border-radius:3px;background:#16202c;overflow:hidden}
  .bar > i{display:block;height:100%;width:35%;border-radius:3px;
    background:linear-gradient(90deg,#2f7fd6,#39c06a);animation:slide 1.1s ease-in-out infinite}
  @keyframes slide{0%{margin-left:-40%}100%{margin-left:100%}}
</style>
</head>
<body>
<canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
<div id="loader">
  <h1>ROCKETSIM</h1>
  <p>IGNITION SEQUENCE</p>
  <div class="bar"><i></i></div>
</div>
<script>
  // Build version (substituted by build.sh) busts CDN/browser caches so the JS
  // and WASM always match — they share an EM_ASM index table and a mismatch is fatal.
  var BUILD_V = '__BUILD_V__';

  (function(){
    var ctx, master, engineGain, engineLow, engineOscA, engineOscB, reentryGain, reentryFilter, reentryWhistle, reentryWhistleGain;
    var lastExploded = 0;
    var unlocked = false;

    function makeNoise(seconds) {
      var len = Math.max(1, Math.floor((ctx ? ctx.sampleRate : 44100) * seconds));
      var buf = ctx.createBuffer(1, len, ctx.sampleRate);
      var d = buf.getChannelData(0);
      for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      return buf;
    }

    function initAudio() {
      if (ctx) return true;
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return false;
      ctx = new AC();

      master = ctx.createGain();
      master.gain.value = 0.55;
      master.connect(ctx.destination);

      engineGain = ctx.createGain();
      engineGain.gain.value = 0;
      engineLow = ctx.createBiquadFilter();
      engineLow.type = 'lowpass';
      engineLow.frequency.value = 280;
      engineLow.Q.value = 0.9;
      engineLow.connect(engineGain);

      var engineNoise = ctx.createBufferSource();
      engineNoise.buffer = makeNoise(2);
      engineNoise.loop = true;
      var engineNoiseGain = ctx.createGain();
      engineNoiseGain.gain.value = 0.46;
      engineNoise.connect(engineNoiseGain).connect(engineLow);

      engineOscA = ctx.createOscillator();
      engineOscA.type = 'sawtooth';
      engineOscA.frequency.value = 42;
      var engineOscAGain = ctx.createGain();
      engineOscAGain.gain.value = 0.18;
      engineOscA.connect(engineOscAGain).connect(engineGain);

      engineOscB = ctx.createOscillator();
      engineOscB.type = 'triangle';
      engineOscB.frequency.value = 84;
      var engineOscBGain = ctx.createGain();
      engineOscBGain.gain.value = 0.10;
      engineOscB.connect(engineOscBGain).connect(engineGain);

      engineGain.connect(master);
      engineNoise.start();
      engineOscA.start();
      engineOscB.start();

      reentryGain = ctx.createGain();
      reentryGain.gain.value = 0;
      reentryFilter = ctx.createBiquadFilter();
      reentryFilter.type = 'bandpass';
      reentryFilter.frequency.value = 1100;
      reentryFilter.Q.value = 1.8;
      var reentryNoise = ctx.createBufferSource();
      reentryNoise.buffer = makeNoise(2);
      reentryNoise.loop = true;
      reentryNoise.connect(reentryFilter).connect(reentryGain);

      reentryWhistle = ctx.createOscillator();
      reentryWhistle.type = 'sine';
      reentryWhistle.frequency.value = 680;
      reentryWhistleGain = ctx.createGain();
      reentryWhistleGain.gain.value = 0;
      reentryWhistle.connect(reentryWhistleGain).connect(reentryGain);

      reentryGain.connect(master);
      reentryNoise.start();
      reentryWhistle.start();
      return true;
    }

    function unlockAudio() {
      unlocked = true;
      if (initAudio() && ctx.state !== 'running') ctx.resume();
    }

    function oneShotCrash() {
      if (!ctx) return;
      var t = ctx.currentTime;
      var boom = ctx.createBufferSource();
      boom.buffer = makeNoise(1.4);
      var boomFilter = ctx.createBiquadFilter();
      boomFilter.type = 'lowpass';
      boomFilter.frequency.setValueAtTime(1500, t);
      boomFilter.frequency.exponentialRampToValueAtTime(90, t + 1.05);
      var boomGain = ctx.createGain();
      boomGain.gain.setValueAtTime(0.001, t);
      boomGain.gain.exponentialRampToValueAtTime(0.95, t + 0.035);
      boomGain.gain.exponentialRampToValueAtTime(0.001, t + 1.25);
      boom.connect(boomFilter).connect(boomGain).connect(master);
      boom.start(t);
      boom.stop(t + 1.35);

      var thump = ctx.createOscillator();
      thump.type = 'triangle';
      thump.frequency.setValueAtTime(72, t);
      thump.frequency.exponentialRampToValueAtTime(31, t + 0.5);
      var thumpGain = ctx.createGain();
      thumpGain.gain.setValueAtTime(0.001, t);
      thumpGain.gain.exponentialRampToValueAtTime(0.75, t + 0.02);
      thumpGain.gain.exponentialRampToValueAtTime(0.001, t + 0.75);
      thump.connect(thumpGain).connect(master);
      thump.start(t);
      thump.stop(t + 0.8);
    }

    window.__rsAudioUpdate = function(engine, reentry, exploded, landed, flight) {
      if (!unlocked || !initAudio()) {
        lastExploded = exploded ? 1 : 0;
        return;
      }
      var t = ctx.currentTime;
      engine = Math.max(0, Math.min(1, engine || 0));
      reentry = Math.max(0, Math.min(1, reentry || 0));
      var engineTarget = flight && !landed && !exploded ? engine : 0;
      var reentryTarget = flight && !landed && !exploded ? reentry : 0;

      engineGain.gain.setTargetAtTime(engineTarget * 0.52, t, 0.08);
      engineLow.frequency.setTargetAtTime(220 + engineTarget * 560, t, 0.12);
      engineOscA.frequency.setTargetAtTime(34 + engineTarget * 32, t, 0.1);
      engineOscB.frequency.setTargetAtTime(76 + engineTarget * 54, t, 0.1);

      reentryGain.gain.setTargetAtTime(reentryTarget * 0.46, t, 0.16);
      reentryFilter.frequency.setTargetAtTime(650 + reentryTarget * 1800, t, 0.15);
      reentryWhistle.frequency.setTargetAtTime(420 + reentryTarget * 950, t, 0.18);
      reentryWhistleGain.gain.setTargetAtTime(reentryTarget * reentryTarget * 0.12, t, 0.12);

      if (exploded && !lastExploded) oneShotCrash();
      lastExploded = exploded ? 1 : 0;
    };

    window.addEventListener('pointerdown', unlockAudio, { passive:true });
    window.addEventListener('keydown', unlockAudio);
    window.addEventListener('touchstart', unlockAudio, { passive:true });
  })();

  var Module = {
    canvas: document.getElementById('canvas'),
    locateFile: function (path, prefix) { return prefix + path + '?v=' + BUILD_V; },
    print: function (t){ console.log(t); },
    printErr: function (t){ console.warn(t); },
    onRuntimeInitialized: function (){
      var l = document.getElementById('loader');
      if (l){ l.style.opacity = 0; setTimeout(function(){ l.remove(); }, 650); }
      document.getElementById('canvas').focus();
    }
  };
  window.addEventListener('load', function(){ document.getElementById('canvas').focus(); });
</script>
<script src="rocketsim.js?v=__BUILD_V__"></script>
</body>
</html>
